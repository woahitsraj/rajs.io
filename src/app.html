<!doctype html>
<html lang="%lang%" dir="%dir%">
	<head>
		<meta charset="utf-8" />
		<meta name="color-scheme" content="light dark" />
		<meta name="theme-color" content="#f3ede3" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<script>
			(() => {
				const light = '#f3ede3';
				const dark = '#15110d';
				const root = document.documentElement;
				root.classList.add('js');
				const themeMeta = document.querySelector('meta[name="theme-color"]');
				const stored = localStorage.getItem('site-theme');
				const isDark =
					stored !== null
						? stored === 'dark'
						: window.matchMedia('(prefers-color-scheme: dark)').matches;

				root.dataset.theme = isDark ? 'dark' : 'light';
				themeMeta?.setAttribute('content', isDark ? dark : light);
			})();
		</script>
		<meta
			name="description"
			content="Rajan Singh is a full-stack developer based in Gothenburg, Sweden. Explore selected work, experience, and ways to connect."
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/lora-400-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/fraunces-300-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="preload"
			href="%sveltekit.assets%/fonts/fraunces-300-italic-latin.woff2"
			as="font"
			type="font/woff2"
			crossorigin="anonymous"
		/>
		<link
			rel="apple-touch-icon"
			sizes="180x180"
			href="%sveltekit.assets%/favicon_io/apple-touch-icon.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="32x32"
			href="%sveltekit.assets%/favicon_io/favicon-32x32.png"
		/>
		<link
			rel="icon"
			type="image/png"
			sizes="16x16"
			href="%sveltekit.assets%/favicon_io/favicon-16x16.png"
		/>
		<link rel="manifest" href="%sveltekit.assets%/favicon_io/site.webmanifest" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<body>
		<div>%sveltekit.body%</div>
	</body>
</html>
